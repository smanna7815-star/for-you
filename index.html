<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You ❤️</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:cursive;
}

body{
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#000,#240018,#4d0026);
color:white;
}

.stars{
position:fixed;
width:100%;
height:100%;
top:0;
left:0;
overflow:hidden;
z-index:-1;
}

.star{
position:absolute;
width:3px;
height:3px;
background:white;
border-radius:50%;
animation:twinkle 2s infinite alternate;
}

@keyframes twinkle{
from{opacity:.2}
to{opacity:1}
}

.container{
text-align:center;
padding:20px;
animation:fadeIn 1.5s;
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.heart{
position:relative;
width:100px;
height:100px;
background:#ff2d95;
transform:rotate(-45deg);
margin:40px auto;
animation:pulse 1.5s infinite;
}

.heart:before,
.heart:after{
content:"";
position:absolute;
width:100px;
height:100px;
background:#ff2d95;
border-radius:50%;
}

.heart:before{
top:-50px;
left:0;
}

.heart:after{
left:50px;
top:0;
}

@keyframes pulse{
0%{transform:rotate(-45deg) scale(1)}
50%{transform:rotate(-45deg) scale(1.15)}
100%{transform:rotate(-45deg) scale(1)}
}

h1{
font-size:2rem;
margin-bottom:20px;
}

p{
font-size:1.2rem;
margin-bottom:25px;
}

button{
padding:14px 35px;
border:none;
border-radius:30px;
background:#ff2d95;
color:white;
font-size:18px;
cursor:pointer;
box-shadow:0 0 20px #ff2d95;
transition:.3s;
}

button:hover{
transform:scale(1.08);
}

.hidden{
display:none;
}
</style>
</head>
<body>

<div class="stars" id="stars"></div>

<div class="container">

<div id="page1">
<div class="heart"></div>
<h1>I want to say something ❤️</h1>
<p>Just listen for a moment...</p>
<button onclick="next1()">Open</button>

</div>

<div id="page2" class="hidden">
<h1>Will you do me a favor? 🥺</h1>
<p>Please click the button below...</p>
<button onclick="next2()">Yes ❤️</button>

</div>

<div id="page3" class="hidden">
<h1>Thank You 💖</h1>
<p>
You are special.<br>
Your smile is beautiful.<br>
And I am lucky to know you. 🌹
</p>
<button onclick="next3()">One More Thing</button>

</div>

<div id="page4" class="hidden">
<h1>💌 Secret Message</h1>
<p>
No matter what happens,<br>
always keep smiling ❤️
</p>
<button onclick="next4()">🌹 For You 🌹</button>
<h2></h2>

</div>

<div id="page5" class="hidden">
<h1>😍</h1>
<p>
 <video id="myVideo" controls autoplay >
<source src="sana.mp4" type="video/mp4">
</video>
</p>
<p><b><i><u>GHOST(S)</u></i></b></p>
</div>

</div>
 

<script>
for(let i=0;i<150;i++){
let star=document.createElement('div');
star.className='star';
star.style.left=Math.random()*100+'%';
star.style.top=Math.random()*100+'%';
star.style.animationDuration=(Math.random()*3+1)+'s';
document.getElementById('stars').appendChild(star);
}

function next1(){
document.getElementById('page1').style.display='none';
document.getElementById('page2').style.display='block';
}

function next2(){
document.getElementById('page2').style.display='none';
document.getElementById('page3').style.display='block';
}

function next3(){
document.getElementById('page3').style.display='none';
document.getElementById('page4').style.display='block';
}

function next4(){
document.getElementById('page4').style.display='none';
document.getElementById('page5').style.display='block';

const video = document.getElementById('myVideo');
    video.muted = false;
    video.play();
}
</script>

</body>
</html>
